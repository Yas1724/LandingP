<svg xmlns="http://www.w3.org/2000/svg" width="290" height="315" fill="none" viewBox="0 0 290 315">
  <defs>
    <!-- Fade from left (transparent) to right (visible) -->
    <linearGradient id="fadeIn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="30%"  stop-color="white" stop-opacity="0"/>
      <stop offset="70%"  stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
    <mask id="fadeMask" maskUnits="userSpaceOnUse" x="0" y="0" width="290" height="315">
      <rect width="290" height="315" fill="url(#fadeIn)"/>
    </mask>
  </defs>

  <g mask="url(#fadeMask)">
    <!-- Concentric rings centered at bottom-right -->
    <g stroke="#1a5c3a" fill="none">
      <circle cx="290" cy="315" r="60"  stroke-width="0.7" opacity="0.50"/>
      <circle cx="290" cy="315" r="85"  stroke-width="0.7" opacity="0.47"/>
      <circle cx="290" cy="315" r="110" stroke-width="0.7" opacity="0.44"/>
      <circle cx="290" cy="315" r="135" stroke-width="0.7" opacity="0.41"/>
      <circle cx="290" cy="315" r="160" stroke-width="0.7" opacity="0.38"/>
      <circle cx="290" cy="315" r="185" stroke-width="0.6" opacity="0.35"/>
      <circle cx="290" cy="315" r="210" stroke-width="0.6" opacity="0.32"/>
      <circle cx="290" cy="315" r="235" stroke-width="0.6" opacity="0.29"/>
      <circle cx="290" cy="315" r="260" stroke-width="0.6" opacity="0.26"/>
      <circle cx="290" cy="315" r="285" stroke-width="0.5" opacity="0.23"/>
      <circle cx="290" cy="315" r="310" stroke-width="0.5" opacity="0.20"/>
      <circle cx="290" cy="315" r="335" stroke-width="0.5" opacity="0.17"/>
      <circle cx="290" cy="315" r="360" stroke-width="0.5" opacity="0.14"/>
      <circle cx="290" cy="315" r="390" stroke-width="0.5" opacity="0.11"/>
      <circle cx="290" cy="315" r="420" stroke-width="0.4" opacity="0.09"/>
    </g>

    <!-- Second set: concentric rings from top-right -->
    <g stroke="#1a5c3a" fill="none">
      <circle cx="290" cy="0" r="55"  stroke-width="0.7" opacity="0.45"/>
      <circle cx="290" cy="0" r="80"  stroke-width="0.7" opacity="0.42"/>
      <circle cx="290" cy="0" r="105" stroke-width="0.6" opacity="0.39"/>
      <circle cx="290" cy="0" r="130" stroke-width="0.6" opacity="0.36"/>
      <circle cx="290" cy="0" r="155" stroke-width="0.6" opacity="0.33"/>
      <circle cx="290" cy="0" r="180" stroke-width="0.6" opacity="0.30"/>
      <circle cx="290" cy="0" r="210" stroke-width="0.5" opacity="0.27"/>
      <circle cx="290" cy="0" r="240" stroke-width="0.5" opacity="0.24"/>
      <circle cx="290" cy="0" r="270" stroke-width="0.5" opacity="0.20"/>
      <circle cx="290" cy="0" r="300" stroke-width="0.5" opacity="0.16"/>
      <circle cx="290" cy="0" r="335" stroke-width="0.4" opacity="0.12"/>
      <circle cx="290" cy="0" r="370" stroke-width="0.4" opacity="0.09"/>
    </g>

    <!-- Diagonal hatch lines across the right side -->
    <g stroke="#1a5c3a" stroke-width="0.45" opacity="0.18">
      <line x1="160" y1="0"   x2="290" y2="100"/>
      <line x1="178" y1="0"   x2="290" y2="87"/>
      <line x1="198" y1="0"   x2="290" y2="72"/>
      <line x1="220" y1="0"   x2="290" y2="55"/>
      <line x1="244" y1="0"   x2="290" y2="36"/>
      <line x1="270" y1="0"   x2="290" y2="15"/>
      <line x1="155" y1="315" x2="290" y2="215"/>
      <line x1="173" y1="315" x2="290" y2="228"/>
      <line x1="193" y1="315" x2="290" y2="243"/>
      <line x1="215" y1="315" x2="290" y2="260"/>
      <line x1="239" y1="315" x2="290" y2="279"/>
      <line x1="265" y1="315" x2="290" y2="300"/>
    </g>

    <!-- Cross diagonal the other way -->
    <g stroke="#1a5c3a" stroke-width="0.45" opacity="0.14">
      <line x1="290" y1="80"  x2="170" y2="315"/>
      <line x1="290" y1="105" x2="195" y2="315"/>
      <line x1="290" y1="132" x2="222" y2="315"/>
      <line x1="290" y1="161" x2="251" y2="315"/>
      <line x1="290" y1="192" x2="280" y2="315"/>
      <line x1="290" y1="60"  x2="150" y2="315"/>
      <line x1="290" y1="38"  x2="168" y2="0"/>
      <line x1="290" y1="18"  x2="192" y2="0"/>
      <line x1="290" y1="225" x2="175" y2="0"/>
      <line x1="290" y1="250" x2="200" y2="0"/>
      <line x1="290" y1="278" x2="228" y2="0"/>
    </g>
  </g>
</svg>
